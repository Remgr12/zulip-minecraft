name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if mod_version changed
        id: check
        run: |
          CURRENT=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          PREVIOUS=$(git show HEAD~1:gradle.properties 2>/dev/null | grep '^mod_version=' | cut -d= -f2 || echo "")

          echo "Current version:  $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$CURRENT" ]; then
            echo "version_changed=true"  >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"      >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"      >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Locate jar
        id: jar
        run: |
          JAR=$(ls build/libs/zulip-bridge-*.jar | grep -v sources | head -n1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $JAR)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Zulip Bridge v${{ needs.check-version.outputs.version }}
          body: |
            Automated release for version `${{ needs.check-version.outputs.version }}`.

            **Requirements**
            - Minecraft `1.21.11`
            - Fabric Loader `0.19.1+`
            - Fabric API
            - owo-lib
          files: ${{ steps.jar.outputs.path }}
          draft: false
          prerelease: false
